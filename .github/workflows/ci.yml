name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --prefix ../..
      - name: Unit tests (Layer 1)
        run: npx jest --no-cache src/ --testTimeout=30000
      - name: Feature tests (Layer 2)
        run: npx jest --no-cache test/feature/ --testTimeout=30000
      - name: E2E tests (Layer 3)
        run: npx jest --no-cache test/e2e/ --testTimeout=30000

  test-mobile:
    name: Mobile Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --prefix ../..
      - name: Unit tests
        run: npx jest --no-cache

  test-web:
    name: Web Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --prefix ../..
      - name: Unit tests
        run: npx jest --no-cache

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-backend, test-mobile, test-web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build backend
        run: cd apps/backend && npx nest build
      - name: Build web
        run: cd apps/web && npx vite build

  deploy-backend:
    name: Deploy Backend
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          command_timeout: 60m
          script: |
            cd /home/ubuntu/services/basemsg
            git pull origin main

            cd /home/ubuntu/services
            docker compose down basemsg-backend --remove-orphans 2>/dev/null || true
            docker rm -f basemsg-backend 2>/dev/null || true
            docker compose build --no-cache basemsg-backend
            docker compose up -d basemsg-backend

  deploy-web:
    name: Deploy Web
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages deploy
        run: curl -s -X POST "${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL }}"
